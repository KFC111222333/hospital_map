<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>品川美食導覽地圖</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: -apple-system, sans-serif; background: #f4f4f9; }
        .container { display: flex; flex-direction: column; height: 100vh; }
        #map { flex: 0 0 45%; width: 100%; border-bottom: 2px solid #ddd; }
        .list-container { flex: 1; overflow-y: auto; background: white; -webkit-overflow-scrolling: touch; }
        .list-header { position: sticky; top: 0; background: #fff; padding: 12px; font-weight: bold; border-bottom: 2px solid #eee; z-index: 10; display: flex; justify-content: space-between; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 12px 8px; text-align: left; border-bottom: 1px solid #eee; cursor: pointer; }
        tr:active { background-color: #f0f0f0; } /* 點擊時的反饋效果 */
        .tag { display: inline-block; padding: 2px 6px; border-radius: 4px; color: #fff; font-size: 10px; margin-bottom: 3px; }
        .name { font-weight: bold; color: #2c3e50; }
        .score { color: #e67e22; font-weight: bold; }
        .addr, .time { color: #7f8c8d; font-size: 11px; margin-top: 2px; }
    </style>
</head>
<body>

<div class="container">
    <div id="map"></div>
    <div class="list-container">
        <div class="list-header">
            <span>美食清單 (點擊項目導向地圖)</span>
        </div>
        <table id="restaurant-table">
            <thead>
                <tr>
                    <th>店名 / 類型</th>
                    <th>評分</th>
                    <th>詳細資訊</th>
                </tr>
            </thead>
            <tbody>
                <!-- 由 JavaScript 動態生成 -->
            </tbody>
        </table>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const restaurants = [
        {name: "China Shadow", type: "中華料理", score: "4.2", addr: "港南2-16-1 26F", time: "11:30–21:00", lat: 35.6310, lng: 139.7408, color: "#E74C3C"},
        {name: "壽司三昧 品川店", type: "壽司", score: "4.0", addr: "港南2-2-10", time: "24 小時", lat: 35.6295, lng: 139.7400, color: "#3498DB"},
        {name: "燒肉 AIMON", type: "燒烤", score: "4.1", addr: "港南2-2-1", time: "11:30–23:00", lat: 35.6280, lng: 139.7410, color: "#F39C12"},
        {name: "天ぷら つな八", type: "天婦羅", score: "3.9", addr: "品川Intercity 3F", time: "11:00–22:00", lat: 35.6265, lng: 139.7415, color: "#9B59B6"},
        {name: "拉麵二郎 品川店", type: "拉麵", score: "4.1", addr: "北品川1-18-5", time: "11:00–21:00", lat: 35.6210, lng: 139.7390, color: "#27AE60"},
        {name: "登龍", type: "中華料理", score: "3.8", addr: "北品川1-24-16", time: "11:30–21:00", lat: 35.6195, lng: 139.7385, color: "#E74C3C"},
        {name: "天ぷら 上島", type: "天婦羅", score: "4.3", addr: "北品川1-22-15", time: "11:30–21:00", lat: 35.6185, lng: 139.7375, color: "#9B59B6"},
        {name: "麺屋 和歌", type: "拉麵", score: "4.0", addr: "北品川1-22-11", time: "11:30–22:00", lat: 35.6175, lng: 139.7370, color: "#27AE60"},
        {name: "御殿山 燒肉 愛肉", type: "燒烤", score: "4.4", addr: "北品川4-7-35", time: "17:00–23:00", lat: 35.6235, lng: 139.7335, color: "#F39C12"},
        {name: "Noodle Dining 高輪", type: "拉麵", score: "3.9", addr: "高輪3-10-20", time: "11:30–22:00", lat: 35.6260, lng: 139.7345, color: "#27AE60"}
    ];

    const map = L.map('map', { zoomControl: false }).setView([35.625, 139.738], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const markers = []; // 用來存儲地圖標記點的陣列
    const latlngs = [];
    const tableBody = document.querySelector('#restaurant-table tbody');

    restaurants.forEach((r, index) => {
        const pos = [r.lat, r.lng];
        latlngs.push(pos);
        
        // 1. 建立地圖標記
        const marker = L.circleMarker(pos, {
            radius: 8,
            fillColor: r.color,
            color: "#fff",
            weight: 2,
            opacity: 1,
            fillOpacity: 0.9
        }).addTo(map).bindPopup(`<b>${r.name}</b><br>評分: ${r.score}`);
        
        markers.push(marker); // 存入陣列

        // 2. 動態生成表格列
        const row = document.createElement('tr');
        row.innerHTML = `
            <td><span class="tag" style="background:${r.color}">${r.type}</span><br><span class="name">${r.name}</span></td>
            <td><span class="score">${r.score || '無'}</span></td>
            <td><div class="addr">${r.addr || '無'}</div><div class="time">🕒 ${r.time || '無'}</div></td>
        `;
        
        // 3. 綁定點擊事件：點擊列時觸發地圖連動
        row.onclick = () => {
            map.flyTo(pos, 17); // 平滑移動並放大
            marker.openPopup();  // 自動打開標籤
            document.getElementById('map').scrollIntoView({ behavior: 'smooth' }); // 行動端自動捲回地圖
        };
        
        tableBody.appendChild(row);
    });

    L.polyline(latlngs, { color: '#2c3e50', weight: 2, opacity: 0.3, dashArray: '5, 10' }).addTo(map);
</script>
</body>
</html>
