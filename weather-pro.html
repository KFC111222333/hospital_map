<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a1c20; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .glass-panel { background: #2c2e36; border-radius: 20px; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="p-5 max-w-md mx-auto">

    <header class="mb-8">
        <h1 id="city-name" class="text-3xl font-semibold mb-6">正在定位...</h1>
        
        <div class="flex justify-between items-start">
            <div>
                <span class="text-gray-400">現在</span>
                <div class="flex items-baseline">
                    <span id="current-temp" class="text-8xl font-light">--</span>
                    <span class="text-4xl font-light">°</span>
                </div>
            </div>
            <div class="text-right mt-4">
                <p id="weather-desc" class="text-lg">--</p>
                <p class="text-sm text-gray-400">體感溫度 : <span id="apparent-temp">--</span>°</p>
            </div>
        </div>
    </header>

    <div class="flex overflow-x-auto space-x-3 mb-6 hide-scrollbar" id="daily-scroll">
        </div>

    <div class="space-y-3">
        <div class="glass-panel p-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="bg-gray-700/50 p-2 rounded-lg">🌧️</div>
                <span>降雨</span>
            </div>
            <span id="pop-val" class="font-mono">--%</span>
        </div>
        
        <div class="glass-panel p-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="bg-gray-700/50 p-2 rounded-lg">💨</div>
                <span>風速</span>
            </div>
            <span id="wind-val" class="font-mono">-- km/h</span>
        </div>

        <div class="glass-panel p-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="bg-gray-700/50 p-2 rounded-lg">💧</div>
                <span>濕度</span>
            </div>
            <span id="humid-val" class="font-mono">--%</span>
        </div>
    </div>

    <script>
const weatherCodes = {
    0: "晴朗", 1: "晴時多雲", 2: "多雲", 3: "陰天",
    45: "霧", 48: "霧", 51: "毛毛雨", 61: "小雨", 95: "雷雨"
};

// 1. 啟動定位與獲取城市名
navigator.geolocation.getCurrentPosition(async (pos) => {
    const { latitude, longitude } = pos.coords;
    
    // 呼叫天氣 API
    updateWeather(latitude, longitude);
    
    // 新增：呼叫地理編碼 API 獲取行政區/城市名稱
    try {
        const geoRes = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${latitude}&longitude=${longitude}&localityLanguage=zh`);
        const geoData = await geoRes.json();
        
        // 優先顯示「區」或「城市」名稱
        const cityName = geoData.locality || geoData.city || geoData.principalSubdivision || "我的位置";
        document.getElementById('city-name').innerText = cityName;
    } catch (err) {
        document.getElementById('city-name').innerText = "當前位置";
    }

}, () => {
    updateWeather(25.03, 121.56); // 預設台北
    document.getElementById('city-name').innerText = "台北市";
});

async function updateWeather(lat, lon) {
    // ... 這部分保持原樣 (Fetch Open-Meteo 資料) ...
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto`;
    
    try {
        const response = await fetch(url);
        const data = await response.json();
        
        document.getElementById('current-temp').innerText = Math.round(data.current.temperature_2m);
        document.getElementById('weather-desc').innerText = weatherCodes[data.current.weather_code] || "多雲";
        document.getElementById('apparent-temp').innerText = Math.round(data.current.apparent_temperature);
        
        document.getElementById('pop-val').innerText = `${data.daily.precipitation_probability_max[0]}%`;
        document.getElementById('wind-val').innerText = `${data.current.wind_speed_10m} 公里/小時`;
        document.getElementById('humid-val').innerText = `${data.current.relative_humidity_2m}%`;

        const scrollContainer = document.getElementById('daily-scroll');
        scrollContainer.innerHTML = '';

        data.daily.time.forEach((time, i) => {
            const date = new Date(time);
            const dayName = i === 0 ? "今天" : `週${['日', '一', '二', '三', '四', '五', '六'][date.getDay()]}`;
            const card = `
                <div class="flex-shrink-0 w-24 p-3 flex flex-col items-center glass-panel ${i === 0 ? 'border border-gray-500' : ''}">
                    <span class="text-sm mb-2 text-gray-400">${dayName}</span>
                    <span class="text-2xl mb-2">${getEmoji(data.daily.weather_code[i])}</span>
                    <span class="text-sm font-medium">${Math.round(data.daily.temperature_2m_max[i])}°/${Math.round(data.daily.temperature_2m_min[i])}°</span>
                </div>
            `;
            scrollContainer.innerHTML += card;
        });
    } catch (err) {
        console.error(err);
    }
}

function getEmoji(code) {
    if (code === 0) return "☀️";
    if (code <= 3) return "☁️";
    if (code >= 61) return "🌧️";
    return "🌥️";
}
    </script>
</body>
</html>
