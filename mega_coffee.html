<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEGA COFFEE Marquee</title>
    
    <!-- Swiper CSS: 跑馬燈必備插件 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root {
            --bg-overlay: rgba(0, 0, 0, 0.6);
            --text-gray: #666;
        }

        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            background-color: var(--bg-overlay); /* 模擬 App 蓋板背景 */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Noto Sans KR", -apple-system, sans-serif;
        }

        /* 跑馬燈主容器 */
        .marquee-card {
            width: 85%;
            max-width: 360px;
            background: white;
            border-radius: 24px; /* 圓角效果 */
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            position: relative;
        }

        /* 圖片區域 */
        .swiper {
            width: 100%;
            aspect-ratio: 1 / 1.3; /* 配合截圖的比例 */
        }

        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 1/6 數字計數器 (位置精準還原) */
        .page-number {
            position: absolute;
            bottom: 70px; /* 避開底部導覽列 */
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 300;
            z-index: 10;
        }

        /* 底部操作欄 */
        .action-bar {
            height: 54px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            background: white;
            border-top: 1px solid #f0f0f0;
        }

        .action-text {
            font-size: 14px;
            color: var(--text-gray);
            cursor: pointer;
            text-decoration: none;
        }

        .close-btn {
            font-weight: 700;
            color: #333;
        }
    </style>
</head>
<body>

<div class="marquee-card">
    <div class="swiper">
        <div class="swiper-wrapper">
            <!-- 依照您的 6 張跑馬燈圖片順序 -->
            <div class="swiper-slide"><img src="1000023735.png"></div> <!-- 1/6 -->
            <div class="swiper-slide"><img src="1000023736.png"></div> <!-- 2/6 -->
            <div class="swiper-slide"><img src="1000023737.png"></div> <!-- 3/6 -->
            <div class="swiper-slide"><img src="1000023738.png"></div> <!-- 4/6 -->
            <div class="swiper-slide"><img src="1000023739.png"></div> <!-- 5/6 -->
            <div class="swiper-slide"><img src="1000023740.png"></div> <!-- 6/6 -->
        </div>
        <!-- 數字顯示器 -->
        <div class="page-number" id="counter">1 / 6</div>
    </div>

    <!-- 底部功能按鈕 -->
    <div class="action-bar">
        <span class="action-text">오늘 하루 보지 않기</span>
        <span class="action-text close-btn">닫기</span>
    </div>
</div>

<!-- Swiper JS -->
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
    const counter = document.getElementById('counter');
    
    const swiper = new Swiper('.swiper', {
        loop: true, // 循環模式
        autoplay: {
            delay: 2500, // 自動輪播時間
            disableOnInteraction: false,
        },
        on: {
            slideChange: function () {
                // 更新右下角數字：realIndex 從 0 開始，所以要 +1
                const current = this.realIndex + 1;
                counter.innerText = `${current} / 6`;
            }
        }
    });

    // 點擊關閉的效果
    document.querySelector('.close-btn').addEventListener('click', function() {
        document.querySelector('.marquee-card').style.display = 'none';
        document.body.style.backgroundColor = '#fff';
    });
</script>

</body>
</html>
